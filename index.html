<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NRZOONE - Women's Clothing & Factory ERP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <script>
      window.onerror = function(msg, url, line, col, error) {
          const errDiv = document.createElement('div');
          errDiv.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;background:black;color:#ff4d4d;padding:40px;z-index:99999;font-family:monospace;overflow:auto;line-height:1.6;";
          errDiv.innerHTML = `
              <div style="max-width:800px;margin:auto;">
                  <h1 style="font-size:40px;border-bottom:2px solid #ff4d4d;padding-bottom:20px;margin-bottom:30px;">💥 CRITICAL BOOT FAILURE</h1>
                  <div style="background:#1a1a1a;padding:30px;border-radius:20px;box-shadow:0 20px 50px rgba(0,0,0,0.5);">
                      <p style="color:#ff9999;font-weight:bold;margin-bottom:20px;">[ERROR MESSAGE]</p>
                      <p style="margin-bottom:30px;font-size:18px;">${msg}</p>
                      <p style="color:#ff9999;font-weight:bold;margin-bottom:10px;">[LOCATION]</p>
                      <p style="margin-bottom:30px;">File: ${url}<br>Line: ${line}:${col}</p>
                      <p style="color:#ff9999;font-weight:bold;margin-bottom:10px;">[STACK TRACE]</p>
                      <pre style="background:#000;padding:20px;border-radius:10px;font-size:12px;color:#ccc;white-space:pre-wrap;">${error?.stack || 'N/A'}</pre>
                  </div>
                  <div style="margin-top:40px;text-align:center;">
                      <button onclick='location.reload()' style='padding:15px 40px;background:#ff4d4d;color:white;border:none;border-radius:15px;cursor:pointer;font-weight:bold;font-size:16px;'>RETRY BOOT</button>
                  </div>
              </div>
          `;
          document.body.appendChild(errDiv);
          return false;
      };
      window.addEventListener('unhandledrejection', (event) => {
          const reason = event.reason || 'Unknown Rejection';
          window.onerror(String(reason.message || reason), 'N/A', 0, 0, reason);
      });
    </script>
  </head>
  <body>
    <div id="root">
      <div style="height:100vh;display:flex;align-items:center;justify-content:center;background:white;font-family:Outfit;font-style:italic;font-weight:900;letter-spacing:-0.05em;color:black;">
        SYNCHRONIZING NEURAL LINK...
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
